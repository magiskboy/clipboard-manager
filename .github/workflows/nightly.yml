name: Nightly Checks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  strict-linux-build:
    name: Strict Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            pkg-config \
            libgtk-3-dev \
            libx11-dev \
            libxtst-dev \
            meson \
            ninja-build

      - name: Build with stricter warnings
        run: make CFLAGS="-std=c11 -Wall -Wextra -Werror -O2 -pipe"

      - name: Upload strict Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager-linux-nightly
          path: |
            build/clipboard-manager
            vendors/libui-ng/build/meson-out/libui.so
          if-no-files-found: error

  strict-windows-build:
    name: Strict Windows Build (MSYS2 MinGW64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja

      - name: Build with stricter warnings
        shell: msys2 {0}
        run: make CFLAGS="-std=c11 -Wall -Wextra -Werror -O2 -pipe"

      - name: Upload strict Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager-windows-nightly
          path: |
            build/clipboard-manager.exe
            vendors/libui-ng/build/meson-out/libui.dll
          if-no-files-found: error
