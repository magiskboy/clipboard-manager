name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            pkg-config \
            libgtk-3-dev \
            libx11-dev \
            libxtst-dev \
            meson \
            ninja-build

      - name: Build
        run: make

      - name: Package Linux release
        run: |
          mkdir -p dist
          cp build/clipboard-manager dist/
          cp vendors/libui-ng/build/meson-out/libui.so dist/
          tar -czf clipboard-manager-linux.tar.gz -C dist .
          sha256sum clipboard-manager-linux.tar.gz > clipboard-manager-linux.tar.gz.sha256

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            clipboard-manager-linux.tar.gz
            clipboard-manager-linux.tar.gz.sha256
          if-no-files-found: error

  release-windows:
    name: Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja

      - name: Build
        shell: msys2 {0}
        run: make CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++

      - name: Prepare Windows release files
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/clipboard-manager.exe dist/
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/
          cp /mingw64/bin/libstdc++-6.dll dist/
          cp /mingw64/bin/libwinpthread-1.dll dist/

      - name: Package Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath clipboard-manager-windows.zip -Force
          $hash = (Get-FileHash clipboard-manager-windows.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  clipboard-manager-windows.zip" | Out-File -Encoding ascii clipboard-manager-windows.zip.sha256

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            clipboard-manager-windows.zip
            clipboard-manager-windows.zip.sha256
          if-no-files-found: error

  create-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-linux
      - release-windows
    permissions:
      contents: write

    steps:
      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-assets

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/clipboard-manager-linux.tar.gz
            release-assets/clipboard-manager-linux.tar.gz.sha256
            release-assets/clipboard-manager-windows.zip
            release-assets/clipboard-manager-windows.zip.sha256
