name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate-source:
    name: Validate Source (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            gcc \
            meson \
            ninja-build

      - name: Verify Makefile target expansion
        run: make -n all

      - name: Verify submodule is available
        run: test -f vendors/libui-ng/meson.build

  build-linux:
    name: Build Linux (Ubuntu)
    runs-on: ubuntu-latest
    needs: validate-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            pkg-config \
            libgtk-3-dev \
            libx11-dev \
            libxtst-dev \
            meson \
            ninja-build

      - name: Build
        run: make

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager-linux
          path: |
            build/clipboard-manager
            vendors/libui-ng/build/meson-out/libui.so
          if-no-files-found: error

  build-windows:
    name: Build Windows (MSYS2 MinGW64)
    runs-on: windows-latest
    needs: validate-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja

      - name: Build
        shell: msys2 {0}
        run: make CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++

      - name: Prepare Windows artifacts
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/clipboard-manager.exe dist/
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/
          cp /mingw64/bin/libstdc++-6.dll dist/
          cp /mingw64/bin/libwinpthread-1.dll dist/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager-windows
          path: |
            dist/clipboard-manager.exe
            dist/libgcc_s_seh-1.dll
            dist/libstdc++-6.dll
            dist/libwinpthread-1.dll
          if-no-files-found: error
